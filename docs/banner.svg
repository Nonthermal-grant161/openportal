<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="OpenPortal — manage your Meta Portal from the browser">
	<title>OpenPortal — manage your Meta Portal from the browser</title>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#1c1c21"/>
			<stop offset="1" stop-color="#0c0c0f"/>
		</linearGradient>
		<linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
			<stop offset="0.35" stop-color="#ffffff" stop-opacity="0.02"/>
			<stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
			<stop offset="0" stop-color="#7c3aed"/>
			<stop offset="1" stop-color="#a78bfa"/>
		</linearGradient>
		<linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#a78bfa"/>
			<stop offset="1" stop-color="#c4b5fd"/>
		</linearGradient>
		<linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
			<stop offset="1" stop-color="#a78bfa" stop-opacity="0.75"/>
		</linearGradient>
		<linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#fafafa"/>
			<stop offset="1" stop-color="#cdcdd3"/>
		</linearGradient>
		<radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
			<stop offset="0" stop-color="#7c3aed" stop-opacity="0.32"/>
			<stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
		</radialGradient>
		<radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
			<stop offset="0" stop-color="#8b5cf6" stop-opacity="0.2"/>
			<stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
		</radialGradient>
		<radialGradient id="fade" cx="0.32" cy="0.45" r="0.85">
			<stop offset="0" stop-color="#ffffff"/>
			<stop offset="1" stop-color="#000000"/>
		</radialGradient>
		<pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
			<circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity="0.05"/>
		</pattern>
		<mask id="gridMask">
			<rect width="1200" height="320" fill="url(#fade)"/>
		</mask>
		<filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
			<feGaussianBlur stdDeviation="4"/>
		</filter>
		<path id="squircle" d="M 50 26.5 L 50 40 A 10 10 0 0 1 40 50 L 24 50 A 10 10 0 0 1 14 40 L 14 24 A 10 10 0 0 1 24 14 L 37.5 14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
		<style>
			@keyframes flow { from { stroke-dashoffset: 1030; } to { stroke-dashoffset: 30; } }
			@keyframes breathe { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
			@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
			@keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.8; } }
			.pulse { animation: flow 5s linear infinite; }
			.halo { animation: breathe 6s ease-in-out infinite; }
			.cursor { animation: blink 1.2s steps(1) infinite; }
			.tw { animation: twinkle 3.5s ease-in-out infinite; }
			.tw2 { animation-delay: 1.2s; }
			.tw3 { animation-delay: 2.3s; }
			@media (prefers-reduced-motion: reduce) { .pulse, .halo, .cursor, .tw { animation: none; } }
		</style>
	</defs>

	<rect x="0.5" y="0.5" width="1199" height="319" rx="20" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.08"/>
	<rect x="1.5" y="1.5" width="1197" height="317" rx="19" fill="none" stroke="url(#edge)"/>
	<rect width="1200" height="320" rx="20" fill="url(#grid)" mask="url(#gridMask)"/>

	<circle class="halo" cx="150" cy="156" r="240" fill="url(#glowL)"/>
	<circle cx="1005" cy="160" r="200" fill="url(#glowR)"/>

	<circle class="tw" cx="318" cy="64" r="2" fill="#c4b5fd"/>
	<circle class="tw tw2" cx="78" cy="262" r="1.6" fill="#a78bfa"/>
	<circle class="tw tw3" cx="226" cy="42" r="1.4" fill="#a78bfa"/>
	<circle class="tw tw2" cx="836" cy="60" r="1.8" fill="#c4b5fd"/>
	<circle class="tw tw3" cx="1148" cy="246" r="1.5" fill="#a78bfa"/>

	<use href="#squircle" transform="translate(134 156) scale(3.7) translate(-32 -32)" stroke="#8b5cf6" stroke-width="0.7" opacity="0.09"/>
	<use href="#squircle" transform="translate(134 156) scale(2.8) translate(-32 -32)" stroke="#8b5cf6" stroke-width="1.1" opacity="0.18"/>

	<g>
		<use href="#squircle" transform="translate(134 156) scale(2) translate(-32 -32)" stroke="url(#ring)" stroke-width="6" filter="url(#soft)" opacity="0.6"/>
		<use href="#squircle" transform="translate(134 156) scale(2) translate(-32 -32)" stroke="url(#ring)" stroke-width="6"/>
		<circle class="halo" cx="164.1" cy="125.9" r="6" fill="#c4b5fd"/>
	</g>

	<text x="250" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1.5"><tspan fill="#fafafa">Open</tspan><tspan fill="url(#wordmark)">Portal</tspan></text>

	<text x="250" y="190" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="16"><tspan fill="#8b5cf6">$</tspan><tspan fill="#9d9da6"> manage your Meta Portal from the browser </tspan><tspan class="cursor" fill="#a78bfa">▍</tspan></text>

	<g font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5" text-anchor="middle">
		<rect x="250" y="214" width="86" height="28" rx="14" fill="#7c3aed" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.35"/>
		<text x="293" y="232.5" fill="#c4b5fd">WEBUSB</text>
		<rect x="346" y="214" width="60" height="28" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
		<text x="376" y="232.5" fill="#b6b6c0">ADB</text>
		<rect x="416" y="214" width="86" height="28" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
		<text x="459" y="232.5" fill="#b6b6c0">SCRCPY</text>
		<rect x="512" y="214" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
		<text x="572" y="232.5" fill="#b6b6c0">NO DRIVERS</text>
	</g>

	<path d="M 134 224 C 134 268 174 292 234 292 L 880 292 C 948 292 982 278 994 260 L 1000 242" fill="none" stroke="url(#cable)" stroke-width="2.5" stroke-linecap="round" pathLength="1000"/>
	<path class="pulse" d="M 134 224 C 134 268 174 292 234 292 L 880 292 C 948 292 982 278 994 260 L 1000 242" fill="none" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round" pathLength="1000" stroke-dasharray="30 970" filter="url(#soft)" opacity="0.5"/>
	<path class="pulse" d="M 134 224 C 134 268 174 292 234 292 L 880 292 C 948 292 982 278 994 260 L 1000 242" fill="none" stroke="#e9d5ff" stroke-width="2.5" stroke-linecap="round" pathLength="1000" stroke-dasharray="30 970"/>

	<g transform="translate(0 12)">
		<ellipse cx="1005" cy="226" rx="108" ry="7" fill="#000000" opacity="0.5"/>
		<rect x="890" y="66" width="230" height="158" rx="20" fill="url(#frame)" stroke="#ffffff" stroke-opacity="0.3"/>
		<rect x="911" y="87" width="188" height="116" rx="7" fill="#0a0a0e"/>
		<circle cx="923" cy="77" r="2.4" fill="#52525b"/>
		<circle cx="932" cy="77" r="1.2" fill="#8b8b94"/>
		<use href="#squircle" transform="translate(1005 136) scale(1.05) translate(-32 -32)" stroke="url(#ring)" stroke-width="6"/>
		<circle cx="1020.8" cy="120.2" r="3.2" fill="#c4b5fd"/>
		<rect x="977" y="174" width="56" height="5" rx="2.5" fill="#ffffff" opacity="0.12"/>
		<rect x="987" y="184" width="36" height="5" rx="2.5" fill="#ffffff" opacity="0.07"/>
		<path d="M 911 87 L 985 87 L 935 203 L 911 203 Z" fill="#ffffff" opacity="0.03"/>
	</g>
</svg>
