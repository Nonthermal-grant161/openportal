<svg xmlns="http://www.w3.org/2000/svg" width="178" height="60" viewBox="0 0 178 60" role="img" aria-label="Get it on OpenPortal">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#1c1c21"/>
			<stop offset="1" stop-color="#0c0c0f"/>
		</linearGradient>
		<linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
			<stop offset="0.4" stop-color="#ffffff" stop-opacity="0.02"/>
			<stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
			<stop offset="0" stop-color="#7c3aed"/>
			<stop offset="1" stop-color="#a78bfa"/>
		</linearGradient>
		<filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
			<feGaussianBlur stdDeviation="7"/>
		</filter>
	</defs>
	<rect x="0.5" y="0.5" width="177" height="59" rx="13" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.09"/>
	<rect x="1.5" y="1.5" width="175" height="57" rx="12" fill="none" stroke="url(#edge)"/>
	<circle cx="30" cy="30" r="13" fill="#8b5cf6" opacity="0.3" filter="url(#glow)"/>
	<path d="M 42.88 25.94 A 13.5 13.5 0 1 1 34.06 17.13" fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round"/>
	<circle cx="40.6" cy="19.4" r="2.4" fill="#c4b5fd"/>
	<text x="56" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="2.2" fill="#a1a1aa">GET IT ON</text>
	<text x="56" y="44.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="-0.2"><tspan fill="#fafafa">Open</tspan><tspan fill="#a78bfa">Portal</tspan></text>
</svg>
